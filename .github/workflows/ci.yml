name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"  # Python 3.13 ne fonctionne pas encore

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          cd app_api
          uv pip install

      - name: Run tests
        run: uv run pytest app_api/tests/

  lint:
    runs-on: ubuntu-latest
    needs: test  # <-- Dépend de "test"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: |
          cd app_api
          uv pip install -e .
      - name: Lint with ruff
        run: uv run ruff check app_api/
